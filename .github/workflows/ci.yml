name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kikoo
          POSTGRES_PASSWORD: kikoo_test
          POSTGRES_DB: kikoo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kikoo -d kikoo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://kikoo:kikoo_test@localhost:5432/kikoo_test
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-long
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 30d
      CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: ci-key
      CLOUDINARY_API_SECRET: ci-secret
      GEMINI_API_KEY: ci-gemini-key
      GOOGLE_CLIENT_ID: ci-google-client-id.apps.googleusercontent.com
      ADMIN_SECRET: ci-admin-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: |
          rm -f .env
          npm run migrate

      - name: Seed test users
        run: npm run seed:users

      - name: Run tests
        run: npm test
