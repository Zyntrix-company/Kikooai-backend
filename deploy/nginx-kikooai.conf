# Optional: replace server_name _ with your domain, then:
#   sudo cp deploy/nginx-kikooai.conf /etc/nginx/sites-available/kikooai-backend
#   sudo ln -sf /etc/nginx/sites-available/kikooai-backend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
