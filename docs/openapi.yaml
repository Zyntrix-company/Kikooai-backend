# ASSIGNMENTS
# ─────────────────────────────────────────────────────────────────────────────
  /assignments/daily:
    get:
      operationId: getDailyAssignment
      summary: Get today's personalised daily exercise set
      tags: [assignments]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Daily assignment with exercises and progress
          content:
            application/json:
              example:
                success: true
