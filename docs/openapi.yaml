                  total_count: 5

# ─────────────────────────────────────────────────────────────────────────────
# GAMES
# ─────────────────────────────────────────────────────────────────────────────
  /games/{type}/seed:
    get:
      operationId: getGameSeed
      summary: Get a random active game seed for the given type (answer_key stripped)
      tags: [games]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [conexo, speed_reading, contextooo, word_blitz, guess_the_word]
      responses:
        '200':
          description: Game seed
          content:
            application/json:
              example:
                success: true
                data:
                  game:
                    id: "game-uuid"
                    type: "conexo"
                    difficulty: "medium"
                    config: { group_count: 4, words_per_group: 4 }
                    seed_json:
                      groups:
                        - { category: "Planets", words: ["Mars", "Venus", "Saturn", "Jupiter"] }
                      mixed_words: ["Mars", "dollar", "French", "Pacific", "Venus"]
        '400':
          description: Invalid game type
          content:
            application/json:
              example: { success: false, error: "Invalid game type", code: "INVALID_TYPE" }
        '404':
          description: No seeds available
          content:
            application/json:
              example: { success: false, error: "No games available for this type", code: "NOT_FOUND" }

  /games/{type}/score:
    post:
      operationId: submitGameScore
      summary: Submit a game score and receive the user's rank
      tags: [games]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [conexo, speed_reading, contextooo, word_blitz, guess_the_word]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [game_id, score]
              properties:
                game_id:            { type: string, format: uuid }
                score:              { type: integer }
                combo:              { type: integer }
                hearts_left:        { type: integer }
                time_taken_seconds: { type: integer }
                metadata:           { type: object }
      responses:
        '200':
          description: Score saved with rank
          content:
            application/json:
              example:
                success: true
                data: { saved: true, rank: 4 }

# ─────────────────────────────────────────────────────────────────────────────
# CONTESTS
# ─────────────────────────────────────────────────────────────────────────────
  /contests:
    post:
      operationId: createContest
      summary: Create a contest (admin only)
      tags: [contests]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, game_type]
              properties:
                title:     { type: string, minLength: 3, maxLength: 120 }
                game_type: { type: string, example: "conexo" }
                start_ts:  { type: string, format: date-time }
                end_ts:    { type: string, format: date-time }
                prize_info:
                  type: object
                  properties:
                    prize_type: { type: string, enum: [pro, certificate, none] }
                    pro_days:   { type: integer }
                settings:
                  type: object
                  properties:
                    randomize_seed:  { type: boolean }
                    pinned_seed_id:  { type: string, format: uuid }
      responses:
        '201':
          description: Contest created
          content:
            application/json:
              example:
                success: true
                data:
                  contest:
                    id: "contest-uuid"
                    token: "a3f9b2..."
                    share_link: "https://app.kikooai.com/contests/a3f9b2..."
                    status: "draft"

    get:
      operationId: listContests
      summary: List active contests
      tags: [contests]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Active contests
          content:
            application/json:
              example:
                success: true
                data:
                  contests:
                    - { id: "contest-uuid", title: "April Conexo Challenge", game_type: "conexo", participant_count: 14, status: "active" }

  /contests/{token}/join:
    post:
      operationId: joinContest
      summary: Join a contest by its share token
      tags: [contests]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Joined — includes game seed
          content:
            application/json:
              example:
                success: true
                data:
                  contest_id: "contest-uuid"
                  contest_title: "April Conexo Challenge"
                  share_link: "https://app.kikooai.com/contests/a3f9b2..."
                  participant_token: "participant-uuid"
                  game_seed: { groups: [], mixed_words: [] }
        '400':
          description: Contest not active
          content:
            application/json:
              example: { success: false, error: "Contest is not currently active", code: "CONTEST_NOT_ACTIVE" }
        '409':
          description: Already joined
          content:
            application/json:
              example: { success: false, error: "Already joined this contest", code: "ALREADY_JOINED" }

  /contests/{token}/leaderboard:
    get:
      operationId: getContestLeaderboard
      summary: Get live ranked leaderboard for a contest
      tags: [contests]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              example:
                success: true
                data:
                  contest_id: "contest-uuid"
                  contest_title: "April Conexo Challenge"
                  leaderboard:
                    - { rank: 1, score: 950, username: "alice99", fullname: "Alice Smith", joined_at: "2026-04-12T10:00:00Z" }
                    - { rank: 2, score: 820, username: "bob42",   fullname: "Bob Jones",  joined_at: "2026-04-12T10:05:00Z" }
                  my_rank: 2
                  my_score: 820

  /contests/{token}/score:
    post:
      operationId: submitContestScore
      summary: Submit or update score for a contest (only improves, never regresses)
      tags: [contests]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:    { type: integer, minimum: 0 }
                metadata: { type: object }
      responses:
        '200':
          description: Updated leaderboard top-10 and caller's rank
          content:
            application/json:
              example:
                success: true
                data:
                  leaderboard: []
                  my_rank: 3
        '403':
          description: Not a participant
          content:
            application/json:
              example: { success: false, error: "You have not joined this contest", code: "NOT_A_PARTICIPANT" }

  /contests/{token}/complete:
    post:
      operationId: completeContest
      summary: Finalize contest, lock ranks, and distribute prizes (admin only)
      tags: [contests]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Contest completed with prize summary
          content:
            application/json:
              example:
                success: true
                data:
                  contest_id: "contest-uuid"
                  status: "completed"
                  prizes_awarded: 1
                  winner_ids: ["user-uuid"]
                  final_leaderboard: []

