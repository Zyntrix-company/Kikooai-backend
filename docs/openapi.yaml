      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [badge_id, badge_name]
              properties:
                badge_id:   { type: string }
                badge_name: { type: string }
      responses:
        '200':
          description: Badge assigned
          content:
            application/json:
              example:
                success: true
                data:
                  user_id: "user-uuid"
                  badges: [{ id: "streak_7", name: "7-Day Streak", awarded_at: "2026-04-12T14:00:00Z" }]

  /admin/users/{id}/badges/remove:
    post:
      operationId: adminRemoveBadge
      summary: Remove a badge from a user (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [badge_id]
              properties:
                badge_id: { type: string }
      responses:
        '200':
          description: Badge removed
          content:
            application/json:
              example: { success: true, data: { user_id: "user-uuid", badges: [] } }

  /admin/users/{id}/grant-pro:
    post:
      operationId: adminGrantPro
      summary: Grant a Pro subscription for N days (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [days]
              properties:
                days: { type: integer, minimum: 1, maximum: 3650 }
      responses:
        '200':
          description: Pro granted
          content:
            application/json:
              example: { success: true, data: { user_id: "user-uuid", subscription_status: "pro", days_granted: 30 } }

  /admin/users/{id}/revoke-pro:
    post:
      operationId: adminRevokePro
      summary: Revoke a Pro subscription immediately (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pro revoked
          content:
            application/json:
              example: { success: true, data: { user_id: "user-uuid", subscription_status: "free" } }

  /admin/promo-codes:
    post:
      operationId: adminCreatePromoCode
      summary: Create a promo code (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, discount_pct]
              properties:
                code:         { type: string, minLength: 3, maxLength: 30 }
                discount_pct: { type: integer, minimum: 0, maximum: 100 }
                max_uses:     { type: integer, minimum: 1 }
                grants_pro:   { type: boolean }
                pro_days:     { type: integer, minimum: 1 }
                expires_at:   { type: string, format: date-time, nullable: true }
      responses:
        '201':
          description: Promo code created
          content:
            application/json:
              example:
                success: true
                data:
                  promo: { id: "promo-uuid", code: "LAUNCH50", discount_pct: 50, grants_pro: false, is_active: true }
        '409':
          description: Code already exists
          content:
            application/json:
              example: { success: false, error: "Promo code already exists", code: "PROMO_DUPLICATE" }

    get:
      operationId: adminListPromoCodes
      summary: List all promo codes (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Promo codes
          content:
            application/json:
              example:
                success: true
                data:
                  promos: [{ id: "promo-uuid", code: "LAUNCH50", uses: 3, max_uses: 100, is_active: true }]

  /admin/promo-codes/{id}:
    patch:
      operationId: adminTogglePromoCode
      summary: Toggle is_active on a promo code (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              example: { success: true, data: { promo: { id: "promo-uuid", code: "LAUNCH50", is_active: false } } }

  /admin/logs:
    get:
      operationId: adminGetLogs
      summary: Query background job logs with optional filters (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, processing, done, failed] }
        - name: type
          in: query
          schema: { type: string, enum: [transcription, resume_analyze, resume_roast, interview_score] }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Job logs
          content:
            application/json:
              example:
                success: true
                data:
                  logs:
                    - { id: "job-uuid", type: "transcription", status: "failed", error_message: "AI transcription service failed", user_id: "user-uuid", attempts: 3, created_at: "2026-04-12T14:00:00Z" }
                  total: 1
                  limit: 50
                  offset: 0

  /admin/jobs/{job_id}/retry:
    post:
      operationId: adminRetryJob
      summary: Re-enqueue a failed background job (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Job re-enqueued
          content:
            application/json:
              example: { success: true, data: { requeued: true, job_id: "job-uuid" } }
        '400':
          description: Job is not in failed state
          content:
            application/json:
              example: { success: false, error: "Job is not in failed state (current: done)", code: "JOB_NOT_FAILED" }
        '404':
          description: Job not found
          content:
            application/json:
              example: { success: false, error: "Job not found", code: "JOB_NOT_FOUND" }

  /admin/export:
    post:
      operationId: adminTriggerExport
      summary: Trigger an async CSV export (admin only) — returns immediately, poll /admin/exports
      tags: [admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [export_type]
              properties:
                export_type: { type: string, enum: [users, transcripts, contest_results, game_scores] }
      responses:
        '202':
          description: Export started
          content:
            application/json:
              example:
                success: true
                data:
                  export_id: "export-uuid"
                  status: "pending"
                  message: "Export started. Poll /admin/exports for status."

  /admin/exports:
    get:
      operationId: adminListExports
      summary: List all export jobs and their download URLs (admin only)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Export history
          content:
            application/json:
              example:
                success: true
                data:
                  exports:
                    - { id: "export-uuid", export_type: "users", status: "done", file_url: "https://res.cloudinary.com/kikoo/raw/upload/v1/kikoo/exports/users-export-uuid.csv", requested_by_username: "admin1", created_at: "2026-04-12T14:00:00Z" }

  /promo-codes/redeem:
    post:
      operationId: redeemPromoCode
      summary: Redeem a promo code (any authenticated user)
      tags: [admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200':
          description: Redeemed
          content:
            application/json:
              example:
                success: true
                data:
                  redeemed: true
                  discount_pct: 50
                  grants_pro: true
                  pro_days: 30
                  code: "LAUNCH50"
        '400':
          description: Code inactive, expired, or exhausted
          content:
            application/json:
              example: { success: false, error: "Promo code has expired", code: "PROMO_EXPIRED" }
        '409':
          description: Already redeemed by this user
          content:
            application/json:
              example: { success: false, error: "You have already redeemed this code", code: "ALREADY_REDEEMED" }
